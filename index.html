<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang web mở nhạc</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ea;
            --secondary: #ff0050;
            --accent: #7000ff;
            --dark: #0a0a1a;
            --darker: #050510;
            --card: rgba(20, 20, 40, 0.7);
            --glass: rgba(255, 255, 255, 0.05);
            --text: #e0e0ff;
            --text-dim: #8899aa;
            --success: #00ff88;
            --error: #ff3366;
            --warning: #ffaa00;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: var(--darker);
            min-height: 100vh;
            color: var(--text);
            overflow-x: hidden;
            position: relative;
        }

        /* Animated background - CSS only, no JS */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(0, 242, 234, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(255, 0, 80, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(112, 0, 255, 0.08) 0%, transparent 50%),
                var(--darker);
        }

        /* Floating orbs - CSS animation, lightweight */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            z-index: -1;
            pointer-events: none;
            will-change: transform;
        }

        .orb-1 {
            width: 300px;
            height: 300px;
            background: var(--primary);
            top: 10%;
            left: 10%;
            animation: orbFloat1 20s ease-in-out infinite;
        }

        .orb-2 {
            width: 250px;
            height: 250px;
            background: var(--secondary);
            top: 60%;
            right: 10%;
            animation: orbFloat2 25s ease-in-out infinite;
        }

        .orb-3 {
            width: 200px;
            height: 200px;
            background: var(--accent);
            bottom: 10%;
            left: 50%;
            animation: orbFloat3 18s ease-in-out infinite;
        }

        @keyframes orbFloat1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(50px, 30px) scale(1.2); }
            66% { transform: translate(-30px, 60px) scale(0.9); }
        }

        @keyframes orbFloat2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(-40px, -50px) scale(1.1); }
            66% { transform: translate(60px, -20px) scale(0.8); }
        }

        @keyframes orbFloat3 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-60px, -40px) scale(1.3); }
        }

        /* Click ripple effect */
        .ripple {
            position: fixed;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 242, 234, 0.4) 0%, transparent 70%);
            transform: scale(0);
            animation: rippleAnim 0.8s ease-out forwards;
            pointer-events: none;
            z-index: 9999;
        }

        @keyframes rippleAnim {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        /* Header */
        .header {
            text-align: center;
            padding: 30px 20px 20px;
            position: relative;
        }

        .header h1 {
            font-size: 2.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0, 242, 234, 0.3);
            animation: glow 3s ease-in-out infinite alternate;
            letter-spacing: 2px;
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 10px rgba(0, 242, 234, 0.5)); }
            to { filter: drop-shadow(0 0 25px rgba(255, 0, 80, 0.5)); }
        }

        .header .subtitle {
            font-size: 1rem;
            color: var(--text-dim);
            margin-top: 8px;
            font-weight: 300;
        }

        .header .author {
            font-size: 0.85rem;
            color: var(--primary);
            margin-top: 5px;
            opacity: 0.8;
        }

        /* Clock */
        .clock-container {
            text-align: center;
            margin: 10px 0 25px;
        }

        .clock {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: var(--card);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 242, 234, 0.2);
            border-radius: 50px;
            padding: 12px 30px;
            box-shadow: 0 0 20px rgba(0, 242, 234, 0.1), inset 0 0 20px rgba(0, 242, 234, 0.05);
        }

        .clock-icon {
            font-size: 1.3rem;
        }

        .clock-text {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--primary);
            letter-spacing: 1px;
            font-variant-numeric: tabular-nums;
        }

        .clock-date {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-left: 5px;
        }

        /* Main container */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px 40px;
        }

        /* Player Section */
        .player-section {
            background: var(--card);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4), 0 0 60px rgba(0, 242, 234, 0.05);
            position: relative;
            overflow: hidden;
        }

        .player-section::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(0, 242, 234, 0.03), transparent 30%);
            animation: rotate 10s linear infinite;
            pointer-events: none;
        }

        @keyframes rotate {
            to { transform: rotate(360deg); }
        }

        .section-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            position: relative;
            z-index: 1;
        }

        .section-title .icon {
            font-size: 1.5rem;
        }

        /* Now Playing */
        .now-playing {
            text-align: center;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        .now-playing .track-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 5px;
            word-break: break-all;
        }

        .now-playing .track-source {
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        /* Progress bar */
        .progress-container {
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 3px;
            width: 0%;
            transition: width 0.1s linear;
            box-shadow: 0 0 10px rgba(0, 242, 234, 0.5);
        }

        .time-display {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-top: 5px;
        }

        /* Controls */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        .control-btn {
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .control-btn:hover {
            background: rgba(0, 242, 234, 0.2);
            border-color: var(--primary);
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(0, 242, 234, 0.3);
        }

        .control-btn.play-btn {
            width: 65px;
            height: 65px;
            font-size: 1.5rem;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border: none;
            color: var(--darker);
        }

        .control-btn.play-btn:hover {
            transform: scale(1.15);
            box-shadow: 0 0 30px rgba(0, 242, 234, 0.5);
        }

        /* Volume */
        .volume-container {
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        .volume-slider {
            width: 120px;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: var(--primary);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 242, 234, 0.5);
        }

        /* Input Section */
        .input-section {
            background: var(--card);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-dim);
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, rgba(0, 242, 234, 0.2), rgba(112, 0, 255, 0.2));
            border-color: var(--primary);
            color: var(--primary);
            box-shadow: 0 0 20px rgba(0, 242, 234, 0.15);
        }

        .tab-btn:hover:not(.active) {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        .input-field {
            width: 100%;
            padding: 14px 18px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            color: var(--text);
            font-size: 0.95rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-field:focus {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(0, 242, 234, 0.1);
        }

        .input-field::placeholder {
            color: rgba(136, 153, 170, 0.5);
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }

        .file-input-wrapper input[type="file"] {
            position: absolute;
            left: -9999px;
        }

        .file-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px dashed rgba(0, 242, 234, 0.3);
            border-radius: 14px;
            color: var(--text-dim);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        .file-label:hover {
            border-color: var(--primary);
            background: rgba(0, 242, 234, 0.05);
            color: var(--primary);
        }

        .file-label.has-file {
            border-color: var(--success);
            color: var(--success);
            background: rgba(0, 255, 136, 0.05);
        }

        /* Add button */
        .add-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border: none;
            border-radius: 14px;
            color: var(--darker);
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 242, 234, 0.3);
        }

        .add-btn:active {
            transform: translateY(0);
        }

        .add-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 16, 0.9);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
            z-index: 10000;
        }

        .loading-overlay.active {
            display: flex;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(0, 242, 234, 0.2);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 1.1rem;
            color: var(--primary);
            font-weight: 600;
        }

        .loading-dots::after {
            content: '';
            animation: dots 1.5s infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        /* Toast notifications */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10001;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            padding: 16px 24px;
            border-radius: 14px;
            color: white;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 300px;
            max-width: 400px;
            animation: slideIn 0.4s ease, fadeOut 0.4s ease 2.6s forwards;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }

        .toast.success {
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.2), rgba(0, 255, 136, 0.05));
            border-color: var(--success);
            color: var(--success);
        }

        .toast.error {
            background: linear-gradient(135deg, rgba(255, 51, 102, 0.2), rgba(255, 51, 102, 0.05));
            border-color: var(--error);
            color: var(--error);
        }

        .toast.info {
            background: linear-gradient(135deg, rgba(0, 242, 234, 0.2), rgba(0, 242, 234, 0.05));
            border-color: var(--primary);
            color: var(--primary);
        }

        .toast.warning {
            background: linear-gradient(135deg, rgba(255, 170, 0, 0.2), rgba(255, 170, 0, 0.05));
            border-color: var(--warning);
            color: var(--warning);
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes fadeOut {
            to { opacity: 0; transform: translateX(100%); }
        }

        /* Playlist */
        .playlist-section {
            background: var(--card);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }

        .playlist-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .playlist-count {
            font-size: 0.85rem;
            color: var(--text-dim);
            background: rgba(0, 0, 0, 0.3);
            padding: 4px 12px;
            border-radius: 20px;
        }

        .playlist-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .playlist-item:hover {
            background: rgba(0, 242, 234, 0.05);
            border-color: rgba(0, 242, 234, 0.2);
            transform: translateX(5px);
        }

        .playlist-item.active {
            background: linear-gradient(135deg, rgba(0, 242, 234, 0.1), rgba(112, 0, 255, 0.1));
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(0, 242, 234, 0.1);
        }

        .playlist-item .number {
            width: 32px;
            height: 32px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-dim);
            flex-shrink: 0;
        }

        .playlist-item.active .number {
            background: var(--primary);
            color: var(--darker);
        }

        .playlist-item .info {
            flex: 1;
            min-width: 0;
        }

        .playlist-item .name {
            font-size: 0.95rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .playlist-item .meta {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-top: 2px;
        }

        .playlist-item .duration {
            font-size: 0.8rem;
            color: var(--text-dim);
            font-variant-numeric: tabular-nums;
        }

        .playlist-item .delete-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 1.1rem;
            padding: 5px;
            border-radius: 6px;
            transition: all 0.2s ease;
            opacity: 0;
        }

        .playlist-item:hover .delete-btn {
            opacity: 1;
        }

        .playlist-item .delete-btn:hover {
            color: var(--error);
            background: rgba(255, 51, 102, 0.1);
        }

        .empty-playlist {
            text-align: center;
            padding: 40px;
            color: var(--text-dim);
        }

        .empty-playlist .icon {
            font-size: 3rem;
            margin-bottom: 10px;
            opacity: 0.5;
        }

        /* YouTube iframe container */
        .youtube-container {
            width: 100%;
            height: 0;
            overflow: hidden;
            position: relative;
            margin-bottom: 20px;
        }

        .youtube-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 242, 234, 0.3);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 242, 234, 0.5);
        }

        /* Responsive */
        @media (max-width: 600px) {
            .header h1 {
                font-size: 2rem;
            }

            .controls {
                gap: 12px;
            }

            .control-btn {
                width: 42px;
                height: 42px;
                font-size: 1rem;
            }

            .control-btn.play-btn {
                width: 55px;
                height: 55px;
                font-size: 1.3rem;
            }

            .toast {
                min-width: auto;
                max-width: calc(100vw - 40px);
            }
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="bg-animation"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text" id="loadingText">Đang thêm nhạc vào hệ thống<span class="loading-dots"></span></div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <div class="header">
        <h1>🎵 Trang web mở nhạc</h1>
        <div class="subtitle">Mở nhạc theo sở thích của bạn như là mp3, mpeg, v.v</div>
        <div class="author">Made by: Nguyễn Chí Dự</div>
    </div>

    <div class="clock-container">
        <div class="clock">
            <span class="clock-icon">🕐</span>
            <span class="clock-text" id="clockTime">--:--:--</span>
            <span class="clock-date" id="clockDate">--/--/----</span>
        </div>
    </div>

    <div class="container">
        <!-- Player -->
        <div class="player-section">
            <div class="section-title">
                <span class="icon">🎧</span>
                Đang phát
            </div>

            <!-- YouTube iframe (hidden) for YouTube tracks -->
            <div class="youtube-container" id="youtubeContainer">
                <div id="youtubePlayer"></div>
            </div>

            <div class="now-playing">
                <div class="track-name" id="trackName">Chưa có bài hát nào</div>
                <div class="track-source" id="trackSource">--</div>
            </div>

            <div class="progress-container">
                <div class="progress-bar" id="progressBar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="time-display">
                    <span id="currentTime">0:00</span>
                    <span id="totalTime">0:00</span>
                </div>
            </div>

            <div class="controls">
                <button class="control-btn" id="prevBtn" title="Bài trước">⏮</button>
                <button class="control-btn play-btn" id="playBtn" title="Phát/Tạm dừng">▶</button>
                <button class="control-btn" id="nextBtn" title="Bài sau">⏭</button>
            </div>

            <div class="volume-container">
                <span>🔊</span>
                <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="80">
                <span id="volumeValue">80%</span>
            </div>

            <audio id="audioPlayer" preload="metadata"></audio>
        </div>

        <!-- Add Music -->
        <div class="input-section">
            <div class="section-title">
                <span class="icon">➕</span>
                Thêm nhạc mới
            </div>

            <div class="tabs">
                <button class="tab-btn active" data-tab="file">
                    <span>📁</span> Tệp/File
                </button>
                <button class="tab-btn" data-tab="link">
                    <span>🔗</span> Liên kết
                </button>
            </div>

            <div class="tab-content active" id="tab-file">
                <div class="input-group">
                    <label>Tên bài hát (tùy chọn)</label>
                    <input type="text" class="input-field" id="fileNameInput" placeholder="Nhập tên bài hát...">
                </div>
                <div class="input-group">
                    <label>Chọn tệp âm thanh (MP3, MPEG, WAV, OGG)</label>
                    <div class="file-input-wrapper">
                        <input type="file" id="fileInput" accept="audio/*">
                        <label for="fileInput" class="file-label" id="fileLabel">
                            <span>📂</span>
                            <span>Nhấn để chọn tệp âm thanh</span>
                        </label>
                    </div>
                </div>
                <button class="add-btn" id="addFileBtn">
                    <span>🎵</span> Thêm vào hệ thống
                </button>
            </div>

            <div class="tab-content" id="tab-link">
                <div class="input-group">
                    <label>Tên bài hát (tùy chọn)</label>
                    <input type="text" class="input-field" id="linkNameInput" placeholder="Nhập tên bài hát...">
                </div>
                <div class="input-group">
                    <label>Liên kết âm thanh (MP3, MPEG, YouTube)</label>
                    <input type="text" class="input-field" id="linkInput" placeholder="https://...">
                </div>
                <button class="add-btn" id="addLinkBtn">
                    <span>🔗</span> Thêm vào hệ thống
                </button>
            </div>
        </div>

        <!-- Playlist -->
        <div class="playlist-section">
            <div class="playlist-header">
                <div class="section-title" style="margin:0">
                    <span class="icon">📋</span>
                    Playlist
                </div>
                <div class="playlist-count" id="playlistCount">0 bài hát</div>
            </div>
            <div id="playlistContainer">
                <div class="empty-playlist">
                    <div class="icon">🎶</div>
                    <div>Playlist trống. Hãy thêm bài hát!</div>
                </div>
            </div>
        </div>
    </div>

    <!-- YouTube IFrame API -->
    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        // ==================== STATE ====================
        let playlist = [];
        let currentIndex = -1;
        let isPlaying = false;
        let audio = document.getElementById('audioPlayer');
        let youtubePlayer = null;
        let isYouTubeTrack = false;
        let youtubeApiReady = false;

        // ==================== YOUTUBE API ====================
        function onYouTubeIframeAPIReady() {
            youtubeApiReady = true;
        }

        function createYouTubePlayer(videoId) {
            if (!youtubeApiReady) {
                showToast('YouTube API chưa sẵn sàng, vui lòng thử lại sau!', 'warning');
                return null;
            }

            const container = document.getElementById('youtubePlayer');
            container.innerHTML = '';

            return new YT.Player('youtubePlayer', {
                height: '1',
                width: '1',
                videoId: videoId,
                playerVars: {
                    'autoplay': 0,
                    'controls': 0,
                    'disablekb': 1,
                    'fs': 0,
                    'modestbranding': 1,
                    'rel': 0,
                    'showinfo': 0,
                    'iv_load_policy': 3
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange,
                    'onError': onPlayerError
                }
            });
        }

        function onPlayerReady(event) {
            event.target.setVolume(80);
            if (isPlaying) {
                event.target.playVideo();
            }
        }

        function onPlayerStateChange(event) {
            if (event.data === YT.PlayerState.ENDED) {
                playNext();
            }
        }

        function onPlayerError(event) {
            showToast('Lỗi phát YouTube! Video có thể bị hạn chế.', 'error');
            stopVisualizer();
            isPlaying = false;
            updatePlayBtn();
        }

        function extractYouTubeId(url) {
            const patterns = [
                /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/,
                /youtube\.com\/watch\?.*v=([a-zA-Z0-9_-]{11})/,
                /youtu\.be\/([a-zA-Z0-9_-]{11})/
            ];
            for (const pattern of patterns) {
                const match = url.match(pattern);
                if (match) return match[1];
            }
            return null;
        }

        function isYouTubeUrl(url) {
            return url.includes('youtube.com') || url.includes('youtu.be');
        }

        // ==================== LOCALSTORAGE ====================
        function savePlaylist() {
            const data = playlist.map(item => ({
                id: item.id,
                name: item.name,
                src: item.src,
                type: item.type,
                duration: item.duration,
                isYouTube: item.isYouTube || false,
                videoId: item.videoId || null
            }));
            localStorage.setItem('musicPlaylist', JSON.stringify(data));
        }

        function loadPlaylist() {
            try {
                const data = JSON.parse(localStorage.getItem('musicPlaylist')) || [];
                playlist = data;
                renderPlaylist();
            } catch (e) {
                playlist = [];
            }
        }

        // ==================== CLOCK ====================
        function updateClock() {
            const now = new Date();
            const vnTime = new Date(now.toLocaleString("en-US", {timeZone: "Asia/Ho_Chi_Minh"}));

            const hours = String(vnTime.getHours()).padStart(2, '0');
            const minutes = String(vnTime.getMinutes()).padStart(2, '0');
            const seconds = String(vnTime.getSeconds()).padStart(2, '0');
            const day = String(vnTime.getDate()).padStart(2, '0');
            const month = String(vnTime.getMonth() + 1).padStart(2, '0');
            const year = vnTime.getFullYear();

            document.getElementById('clockTime').textContent = `${hours}:${minutes}:${seconds}`;
            document.getElementById('clockDate').textContent = `${day}/${month}/${year}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // ==================== CLICK RIPPLE ====================
        document.addEventListener('click', function(e) {
            const ripple = document.createElement('div');
            ripple.className = 'ripple';
            ripple.style.left = (e.clientX - 50) + 'px';
            ripple.style.top = (e.clientY - 50) + 'px';
            ripple.style.width = '100px';
            ripple.style.height = '100px';
            document.body.appendChild(ripple);
            setTimeout(() => ripple.remove(), 800);
        });

        // ==================== TOAST ====================
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;

            const icons = { success: '✅', error: '❌', info: 'ℹ️', warning: '⚠️' };
            toast.innerHTML = `<span>${icons[type]}</span><span>${message}</span>`;

            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // ==================== LOADING ====================
        function showLoading(text = 'Đang thêm nhạc vào hệ thống') {
            document.getElementById('loadingText').innerHTML = text + '<span class="loading-dots"></span>';
            document.getElementById('loadingOverlay').classList.add('active');
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').classList.remove('active');
        }

        // ==================== FORMAT TIME ====================
        function formatTime(seconds) {
            if (isNaN(seconds) || seconds === Infinity) return '0:00';
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m}:${String(s).padStart(2, '0')}`;
        }

        // ==================== AUDIO CONTROLS ====================
        function loadTrack(index) {
            if (index < 0 || index >= playlist.length) return;
            currentIndex = index;
            const track = playlist[index];

            // Cleanup previous
            if (youtubePlayer) {
                try {
                    youtubePlayer.destroy();
                } catch(e) {}
                youtubePlayer = null;
            }
            audio.pause();
            audio.src = '';

            isYouTubeTrack = track.isYouTube || false;

            if (isYouTubeTrack && track.videoId) {
                // YouTube track
                youtubePlayer = createYouTubePlayer(track.videoId);
                document.getElementById('trackName').textContent = track.name;
                document.getElementById('trackSource').textContent = '📺 YouTube Video';

                // For YouTube, we can't get exact duration easily, so show from stored data
                document.getElementById('totalTime').textContent = track.duration > 0 ? formatTime(track.duration) : '--:--';
            } else {
                // Normal audio track
                audio.src = track.src;
                audio.load();

                document.getElementById('trackName').textContent = track.name;
                document.getElementById('trackSource').textContent = track.type === 'file' ? '📁 Tệp cục bộ' : '🔗 Liên kết';
            }

            renderPlaylist();

            if (!isYouTubeTrack) {
                audio.play().then(() => {
                    isPlaying = true;
                    updatePlayBtn();
                }).catch(err => {
                    showToast('Không thể phát bài hát này: ' + err.message, 'error');
                });
            } else {
                // YouTube will play in onPlayerReady
                isPlaying = true;
                updatePlayBtn();
            }
        }

        function togglePlay() {
            if (currentIndex === -1) {
                if (playlist.length > 0) {
                    loadTrack(0);
                } else {
                    showToast('Playlist trống! Hãy thêm bài hát trước.', 'info');
                }
                return;
            }

            if (isYouTubeTrack && youtubePlayer) {
                const state = youtubePlayer.getPlayerState ? youtubePlayer.getPlayerState() : -1;
                if (state === YT.PlayerState.PLAYING) {
                    youtubePlayer.pauseVideo();
                    isPlaying = false;
                } else {
                    youtubePlayer.playVideo();
                    isPlaying = true;
                }
                updatePlayBtn();
                return;
            }

            if (audio.paused) {
                audio.play().then(() => {
                    isPlaying = true;
                    updatePlayBtn();
                }).catch(err => {
                    showToast('Lỗi phát nhạc: ' + err.message, 'error');
                });
            } else {
                audio.pause();
                isPlaying = false;
                updatePlayBtn();
            }
        }

        function updatePlayBtn() {
            document.getElementById('playBtn').innerHTML = isPlaying ? '⏸' : '▶';
        }

        function playNext() {
            if (playlist.length === 0) return;
            const next = (currentIndex + 1) % playlist.length;
            loadTrack(next);
        }

        function playPrev() {
            if (playlist.length === 0) return;
            const prev = (currentIndex - 1 + playlist.length) % playlist.length;
            loadTrack(prev);
        }

        // ==================== PROGRESS ====================
        audio.addEventListener('timeupdate', () => {
            if (audio.duration && !isYouTubeTrack) {
                const pct = (audio.currentTime / audio.duration) * 100;
                document.getElementById('progressFill').style.width = pct + '%';
                document.getElementById('currentTime').textContent = formatTime(audio.currentTime);
                document.getElementById('totalTime').textContent = formatTime(audio.duration);
            }
        });

        audio.addEventListener('loadedmetadata', () => {
            if (!isYouTubeTrack) {
                document.getElementById('totalTime').textContent = formatTime(audio.duration);
            }
        });

        audio.addEventListener('ended', () => {
            if (!isYouTubeTrack) {
                playNext();
            }
        });

        audio.addEventListener('error', (e) => {
            showToast('Lỗi tải nhạc! Kiểm tra lại file hoặc link.', 'error');
            isPlaying = false;
            updatePlayBtn();
        });

        document.getElementById('progressBar').addEventListener('click', (e) => {
            if (isYouTubeTrack && youtubePlayer) {
                const duration = youtubePlayer.getDuration ? youtubePlayer.getDuration() : 0;
                if (duration > 0) {
                    const rect = e.currentTarget.getBoundingClientRect();
                    const pct = (e.clientX - rect.left) / rect.width;
                    youtubePlayer.seekTo(duration * pct, true);
                }
                return;
            }

            if (!audio.duration) return;
            const rect = e.currentTarget.getBoundingClientRect();
            const pct = (e.clientX - rect.left) / rect.width;
            audio.currentTime = pct * audio.duration;
        });

        // YouTube progress update
        setInterval(() => {
            if (isYouTubeTrack && youtubePlayer && youtubePlayer.getCurrentTime && isPlaying) {
                const current = youtubePlayer.getCurrentTime();
                const duration = youtubePlayer.getDuration();
                if (duration > 0) {
                    const pct = (current / duration) * 100;
                    document.getElementById('progressFill').style.width = pct + '%';
                    document.getElementById('currentTime').textContent = formatTime(current);
                    document.getElementById('totalTime').textContent = formatTime(duration);
                }
            }
        }, 500);

        // ==================== VOLUME ====================
        document.getElementById('volumeSlider').addEventListener('input', (e) => {
            const val = e.target.value;
            audio.volume = val / 100;
            if (youtubePlayer && youtubePlayer.setVolume) {
                youtubePlayer.setVolume(val);
            }
            document.getElementById('volumeValue').textContent = val + '%';
        });
        audio.volume = 0.8;

        // ==================== TABS ====================
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
            });
        });

        // ==================== FILE INPUT ====================
        document.getElementById('fileInput').addEventListener('change', (e) => {
            const label = document.getElementById('fileLabel');
            if (e.target.files.length > 0) {
                label.classList.add('has-file');
                label.innerHTML = `<span>✅</span><span>${e.target.files[0].name}</span>`;
                if (!document.getElementById('fileNameInput').value) {
                    document.getElementById('fileNameInput').value = e.target.files[0].name.replace(/\.[^/.]+$/, '');
                }
            } else {
                label.classList.remove('has-file');
                label.innerHTML = `<span>📂</span><span>Nhấn để chọn tệp âm thanh</span>`;
            }
        });

        // ==================== ADD FILE ====================
        document.getElementById('addFileBtn').addEventListener('click', async () => {
            const fileInput = document.getElementById('fileInput');
            const nameInput = document.getElementById('fileNameInput');

            if (!fileInput.files.length) {
                showToast('Vui lòng chọn tệp âm thanh!', 'error');
                return;
            }

            const file = fileInput.files[0];

            // Check file type
            const validTypes = ['audio/mpeg', 'audio/mp3', 'audio/wav', 'audio/ogg', 'audio/x-mpeg', 'audio/mpg'];
            const validExts = ['.mp3', '.mpeg', '.wav', '.ogg', '.mpg'];
            const ext = '.' + file.name.split('.').pop().toLowerCase();

            if (!validTypes.includes(file.type) && !validExts.includes(ext)) {
                showToast('Chỉ hỗ trợ file MP3, MPEG, WAV, OGG!', 'error');
                return;
            }

            showLoading();

            // Delay 2-5s
            const delay = Math.floor(Math.random() * 3000) + 2000;
            await new Promise(r => setTimeout(r, delay));

            try {
                const url = URL.createObjectURL(file);
                const name = nameInput.value.trim() || file.name.replace(/\.[^/.]+$/, '');

                const track = {
                    id: Date.now() + Math.random(),
                    name: name,
                    src: url,
                    type: 'file',
                    duration: 0,
                    isYouTube: false
                };

                // Get duration
                const tempAudio = new Audio(url);
                tempAudio.addEventListener('loadedmetadata', () => {
                    track.duration = tempAudio.duration;
                    playlist.push(track);
                    savePlaylist();
                    renderPlaylist();
                    hideLoading();
                    showToast(`Đã thêm "${name}" vào playlist!`, 'success');

                    // Reset
                    fileInput.value = '';
                    nameInput.value = '';
                    const label = document.getElementById('fileLabel');
                    label.classList.remove('has-file');
                    label.innerHTML = `<span>📂</span><span>Nhấn để chọn tệp âm thanh</span>`;

                    if (playlist.length === 1) {
                        loadTrack(0);
                    }
                });

                tempAudio.addEventListener('error', () => {
                    hideLoading();
                    showToast('Không thể đọc file âm thanh!', 'error');
                });

            } catch (err) {
                hideLoading();
                showToast('Lỗi: ' + err.message, 'error');
            }
        });

        // ==================== ADD LINK ====================
        document.getElementById('addLinkBtn').addEventListener('click', async () => {
            const linkInput = document.getElementById('linkInput');
            const nameInput = document.getElementById('linkNameInput');
            const url = linkInput.value.trim();

            if (!url) {
                showToast('Vui lòng nhập liên kết!', 'error');
                return;
            }

            // Check if YouTube
            const videoId = extractYouTubeId(url);
            if (videoId) {
                // YouTube video - convert to MP3
                showLoading('Đang chuyển video thành MP3');

                // Delay 2-5s
                const delay = Math.floor(Math.random() * 3000) + 2000;
                await new Promise(r => setTimeout(r, delay));

                const name = nameInput.value.trim() || 'YouTube Video';

                const track = {
                    id: Date.now() + Math.random(),
                    name: name,
                    src: url,
                    type: 'link',
                    duration: 0,
                    isYouTube: true,
                    videoId: videoId
                };

                // Try to get video info via noembed
                try {
                    const response = await fetch(`https://noembed.com/embed?url=https://www.youtube.com/watch?v=${videoId}`);
                    const data = await response.json();
                    if (data.title) {
                        track.name = nameInput.value.trim() || data.title;
                    }
                } catch (e) {
                    // Ignore error, use default name
                }

                playlist.push(track);
                savePlaylist();
                renderPlaylist();
                hideLoading();
                showToast(`Đã chuyển video YouTube "${track.name}" thành MP3!`, 'success');

                linkInput.value = '';
                nameInput.value = '';

                if (playlist.length === 1) {
                    loadTrack(0);
                }
                return;
            }

            // Normal audio link
            if (!url.match(/^https?:\/\/.+/i)) {
                showToast('Liên kết không hợp lệ! Phải bắt đầu bằng http:// hoặc https://', 'error');
                return;
            }

            showLoading();

            // Delay 2-5s
            const delay = Math.floor(Math.random() * 3000) + 2000;
            await new Promise(r => setTimeout(r, delay));

            try {
                const name = nameInput.value.trim() || url.split('/').pop().split('?')[0] || 'Bài hát không tên';

                const track = {
                    id: Date.now() + Math.random(),
                    name: name,
                    src: url,
                    type: 'link',
                    duration: 0,
                    isYouTube: false
                };

                // Verify link
                const tempAudio = new Audio(url);
                tempAudio.preload = 'metadata';

                const onLoaded = () => {
                    track.duration = tempAudio.duration;
                    playlist.push(track);
                    savePlaylist();
                    renderPlaylist();
                    hideLoading();
                    showToast(`Đã thêm "${name}" vào playlist!`, 'success');

                    linkInput.value = '';
                    nameInput.value = '';

                    if (playlist.length === 1) {
                        loadTrack(0);
                    }
                };

                const onError = () => {
                    hideLoading();
                    showToast('Không thể tải nhạc từ liên kết này! Kiểm tra lại URL.', 'error');
                };

                tempAudio.addEventListener('loadedmetadata', onLoaded);
                tempAudio.addEventListener('error', onError);

                // Timeout after 10s
                setTimeout(() => {
                    if (playlist.find(p => p.id === track.id)) return;
                    hideLoading();
                    showToast('Liên kết quá chậm hoặc không hợp lệ!', 'error');
                }, 10000);

            } catch (err) {
                hideLoading();
                showToast('Lỗi: ' + err.message, 'error');
            }
        });

        // ==================== RENDER PLAYLIST ====================
        function renderPlaylist() {
            const container = document.getElementById('playlistContainer');
            const count = document.getElementById('playlistCount');

            count.textContent = `${playlist.length} bài hát`;

            if (playlist.length === 0) {
                container.innerHTML = `
                    <div class="empty-playlist">
                        <div class="icon">🎶</div>
                        <div>Playlist trống. Hãy thêm bài hát!</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = '';
            playlist.forEach((track, index) => {
                const item = document.createElement('div');
                item.className = 'playlist-item' + (index === currentIndex ? ' active' : '');

                const typeIcon = track.isYouTube ? '📺' : (track.type === 'file' ? '📁' : '🔗');
                const typeLabel = track.isYouTube ? 'YouTube' : (track.type === 'file' ? 'File' : 'Link');

                item.innerHTML = `
                    <div class="number">${index + 1}</div>
                    <div class="info">
                        <div class="name">${track.name}</div>
                        <div class="meta">${typeIcon} ${typeLabel} ${track.duration > 0 ? '• ' + formatTime(track.duration) : ''}</div>
                    </div>
                    <div class="duration">${track.duration > 0 ? formatTime(track.duration) : '--:--'}</div>
                    <button class="delete-btn" data-index="${index}" title="Xóa">🗑</button>
                `;

                item.addEventListener('click', (e) => {
                    if (e.target.classList.contains('delete-btn')) return;
                    loadTrack(index);
                });

                item.querySelector('.delete-btn').addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteTrack(index);
                });

                container.appendChild(item);
            });
        }

        function deleteTrack(index) {
            const track = playlist[index];
            if (index === currentIndex) {
                if (youtubePlayer) {
                    try {
                        youtubePlayer.destroy();
                    } catch(e) {}
                    youtubePlayer = null;
                }
                audio.pause();
                audio.src = '';
                isPlaying = false;
                updatePlayBtn();
                currentIndex = -1;
                document.getElementById('trackName').textContent = 'Chưa có bài hát nào';
                document.getElementById('trackSource').textContent = '--';
                document.getElementById('progressFill').style.width = '0%';
                document.getElementById('currentTime').textContent = '0:00';
                document.getElementById('totalTime').textContent = '0:00';
            } else if (index < currentIndex) {
                currentIndex--;
            }

            if (track.type === 'file' && track.src.startsWith('blob:')) {
                URL.revokeObjectURL(track.src);
            }

            playlist.splice(index, 1);
            savePlaylist();
            renderPlaylist();
            showToast('Đã xóa bài hát!', 'info');
        }

        // ==================== BUTTON EVENTS ====================
        document.getElementById('playBtn').addEventListener('click', togglePlay);
        document.getElementById('nextBtn').addEventListener('click', playNext);
        document.getElementById('prevBtn').addEventListener('click', playPrev);

        // ==================== INIT ====================
        loadPlaylist();

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && e.target.tagName !== 'INPUT') {
                e.preventDefault();
                togglePlay();
            }
        });
    </script>
</body>
</html>
